name: AKI Star Volume Stock Scanner

on:
  schedule:
    - cron: "10 10 * * 1-5"
  workflow_dispatch:

jobs:
  AKI_star_volume_scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install AKI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r AKI_requirements.txt

      - name: Run AKI scanner and push
        env:
          AKI_SERVER_CHAN_SENDKEY: ${{ secrets.AKI_SERVER_CHAN_SENDKEY }}
        run: python AKI_star_volume_scanner.py

      - name: Upload AKI report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: AKI-star-volume-report
          path: AKI_reports/*.md
          if-no-files-found: ignore
