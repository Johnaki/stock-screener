name: AKI 星星量相似度筛选

on:
  workflow_dispatch:
  schedule:
    - cron: "10 10 * * 1-5"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas requests

      - name: 运行相似度筛选
        env:
          AKI_SERVER_CHAN_SENDKEY: ${{ secrets.AKI_SERVER_CHAN_SENDKEY }}
          AKI_MAX_STOCKS: "2200"
          AKI_MAX_WORKERS: "6"
        run: python aki_similarity_scanner.py
