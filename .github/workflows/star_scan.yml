name: star-volume-scan

on:
  schedule:
    - cron: '0 9 * * 1-5'   # 北京时间约17:00（收盘后）
  workflow_dispatch:

permissions:
  contents: write            # 允许把 watchlist.json 提交回仓库

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run screener
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: python star_volume_screener.py

      - name: Commit watchlist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add watchlist.json archive.json
          git commit -m "update data $(date +%F)" || echo "no changes"
          git push || echo "push skipped"
