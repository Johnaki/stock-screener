name: star-volume-scan

on:
  schedule:
    # GitHub Actions 用的是 UTC 时间。
    # 09:00 UTC = 北京时间 17:00（A股 15:00 收盘后，数据已结算）
    - cron: '0 9 * * 1-5'
  workflow_dispatch:   # 允许在网页上手动点一下就跑

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run screener
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: python star_volume_screener.py
