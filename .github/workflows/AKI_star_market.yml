name: AKI 星星量全市场扫描

on:
  workflow_dispatch:
  schedule:
    - cron: "10 10 * * 1-5"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas requests

      - name: 全市场扫描并推送
        env:
          AKI_SERVER_CHAN_SENDKEY: ${{ secrets.AKI_SERVER_CHAN_SENDKEY }}
        run: |
          cat > scan_market.py <<'PY'
          import concurrent.futures
          import datetime as dt
          import os
          import time

          import akshare as ak
          import pandas as pd
          import requests

          KEY = os.getenv("AKI_SERVER_CHAN_SENDKEY")
          MAX_WORKERS = 6
          MAX_STOCKS = 5000

          def push(title, text):
              if not KEY:
                  raise RuntimeError("没有设置 AKI_SERVER_CHAN_SENDKEY")
              url = f"https://sctapi.ftqq.com/{KEY}.send"
              r = requests.post(url, data={"title": title, "desp": text}, timeout=30)
              print(r.text)
              r.raise_for_status()

          def stock_list():
              try:
                  d = ak.stock_zh_a_spot_em()
                  d = d.rename(columns={"代码":"code","名称":"name","最新价":"price","总市值":"cap"})
                  d["code"] = d["code"].astype(str).str.zfill(6)
                  d["name"] = d["name"].astype(str)
                  d["price"] = pd.to_numeric(d["price"], errors="coerce")
                  d["cap_yi"] = pd.to_numeric(d["cap"], errors="coerce") / 100000000
                  d = d[~d["name"].str.contains("ST", case=False, na=False)]
                  d = d[~d["code"].str.startswith(("8","4","9"))]
                  d = d[(d["price"] >= 2.5) & (d["price"] <= 160)]
                  d = d[(d["cap_yi"].isna()) | ((d["cap_yi"] >= 8) & (d["cap_yi"] <= 2500))]
                  return d[["code","name"]].drop_duplicates("code").head(MAX_STOCKS).to_dict("records")
              except Exception as e:
                  print("东方财富股票列表失败，改用交易所列表：", e)

              frames = []
              for fn, kwargs, code_col, name_col in [
                  (ak.stock_info_sh_name_code, {"symbol":"主板A股"}, "证券代码", "证券简称"),
                  (ak.stock_info_sh_name_code, {"symbol":"科创板"}, "证券代码", "证券简称"),
                  (ak.stock_info_sz_name_code, {"symbol":"A股列表"}, "A股代码", "A股简称"),
              ]:
                  try:
                      x = fn(**kwargs).rename(columns={code_col:"code", name_col:"name"})
                      frames.append(x[["code","name"]])
                  except Exception as e:
                      print("备用列表部分失败：", e)

              if not frames:
                  raise RuntimeError("无法获取股票列表，停止扫描")

              d = pd.concat(frames, ignore_index=True)
              d["code"] = d["code"].astype(str).str.split(".", expand=True).iloc[:,0].str.zfill(6)
              d["name"] = d["name"].astype(str)
              d = d[~d["name"].str.contains("ST", case=False, na=False)]
              d = d[~d["code"].str.startswith(("8","4","9"))]
              return d.drop_duplicates("code")[["code","name"]].head(MAX_STOCKS).to_dict("records")

          def history(code):
              end = dt.date.today().strftime("%Y%m%d")
              start = (dt.date.today() - dt.timedelta(days=520)).strftime("%Y%m%d")
              prefix = "sh" if code.startswith("6") else "sz"
              try:
                  return ak.stock_zh_a_daily(symbol=f"{prefix}{code}", start_date=start, end_date=end, adjust="qfq")
              except Exception:
                  return ak.stock_zh_a_hist(symbol=code, period="daily", start_date=start, end_date=end, adjust="qfq", timeout=15)

          def prep(df):
              if "日期" in df.columns:
                  df = df.rename(columns={"日期":"date","开盘":"open","收盘":"close","最高":"high","最低":"low","成交量":"volume"})
              if "date" not in df.columns:
                  df = df.reset_index().rename(columns={"index":"date"})
              for c in ["open","close","high","low","volume"]:
                  df[c] = pd.to_numeric(df[c], errors="coerce")
              df["date"] = pd.to_datetime(df["date"], errors="coerce")
              df = df.dropna(subset=["date","open","close","high","low","volume"]).sort_values("date").reset_index(drop=True)
              df["v5"] = df.volume.rolling(5).mean()
              df["v20"] = df.volume.rolling(20).mean()
              df["v60"] = df.volume.rolling(60).mean()
              df["ma13"] = df.close.rolling(13).mean()
              df["ma35"] = df.close.rolling(35).mean()
              df["ma55"] = df.close.rolling(55).mean()
              e12 = df.close.ewm(span=12, adjust=False).mean()
              e26 = df.close.ewm(span=26, adjust=False).mean()
              diff = e12 - e26
              df["macd"] = (diff - diff.ewm(span=9, adjust=False).mean()) * 2
              return df

          def scan_one(item):
              code, name = item["code"], item["name"]
              try:
                  df = prep(history(code))
              except Exception as e:
                  print(code, name, "行情失败", e)
                  return None
              if len(df) < 130:
                  return None

              last = df.iloc[-1]
              best = None
              start_i = max(70, len(df) - 120)
              for i in range(start_i, len(df)-2):
                  row = df.iloc[i]
                  r12 = df.iloc[max(0, i-11):i+1]
                  r120 = df.iloc[max(0, i-119):i+1]
                  if len(r12) < 8 or len(r120) < 60:
                      continue

                  pos = (row.close - r120.low.min()) / max(r120.high.max() - r120.low.min(), 0.01)
                  tight = (r12.high.max() - r12.low.min()) / max(r12.low.min(), 0.01)
                  vr = row.v5 / max(row.v20, 1)
                  low_vol = (
                      row.v5 <= row.v20 * 1.05
                      or row.v5 <= row.v60 * 0.90
                      or r12.volume.median() <= r120.volume.quantile(0.55)
                  )
                  not_started = row.close / max(df.close.iloc[max(0, i-20)], 0.01) - 1 <= 0.45
                  if not (low_vol and pos <= 0.85 and tight <= 0.45 and not_started):
                      continue

                  low = min(r12.low.min(), df.iloc[i+1:].low.min())
                  gain = last.close / max(low, 0.01) - 1
                  gain_after = last.close / max(row.close, 0.01) - 1
                  pct5 = last.close / max(df.close.iloc[-6], 0.01) - 1
                  pct20 = last.close / max(df.close.iloc[-21], 0.01) - 1
                  nowv = last.v5 / max(last.v20, 1)
                  days = len(df) - 1 - i

                  exploded = days <= 100 and gain >= 0.10 and (
                      gain_after >= 0.06
                      or pct5 >= 0.03
                      or nowv >= 1.05
                      or last.close >= last.ma35 * 0.95
                  )
                  ready = days <= 35 and gain < 0.18 and pct20 <= 0.25 and (
                      last.close >= last.ma13 * 0.90
                      or last.macd >= df.macd.iloc[-2]
                  )
                  if not exploded and not ready:
                      continue

                  score = 60 + gain * 100
                  score += max(0, 1.05 - min(vr, 1.05)) * 30
                  score += max(0, 0.45 - min(tight, 0.45)) * 40
                  score += max(0, 110 - days) * 0.8
                  group = "已暴涨验证组" if exploded else "有暴涨趋势组"
                  result = {
                      "score": float(score), "group": group, "name": name, "code": code,
                      "close": float(last.close), "day": row.date.strftime("%Y-%m-%d"),
                      "gain": float(gain), "pct5": float(pct5), "pct20": float(pct20),
                      "vr": float(vr), "tight": float(tight), "pos": float(pos), "nowv": float(nowv),
                  }
                  if best is None or result["score"] > best["score"]:
                      best = result
              return best

          def fmt(x, i):
              return (
                  f"{i}. {x['name']}({x['code']}) 收{x['close']:.2f}，评分{x['score']:.1f}\n"
                  f"   星星量日：{x['day']}，星星量后涨幅：{x['gain']:.1%}，5日：{x['pct5']:.1%}，20日：{x['pct20']:.1%}\n"
                  f"   特征：当时量比{x['vr']:.2f}，12日振幅{x['tight']:.1%}，低位位置{x['pos']:.1%}，当前量比{x['nowv']:.2f}"
              )

          items = stock_list()
          print("准备扫描", len(items), "只股票")
          results = []
          errors = 0
          with concurrent.futures.ThreadPoolExecutor(max_workers=MAX_WORKERS) as ex:
              futures = [ex.submit(scan_one, item) for item in items]
              for i, f in enumerate(concurrent.futures.as_completed(futures), 1):
                  try:
                      r = f.result()
                      if r:
                          results.append(r)
                  except Exception as e:
                      errors += 1
                      print("单股扫描失败：", e)
                  if i % 200 == 0:
                      print(f"已扫描 {i}/{len(items)}，命中 {len(results)}")
                  time.sleep(0.01)

          exploded = sorted([x for x in results if x["group"] == "已暴涨验证组"], key=lambda x: x["score"], reverse=True)[:40]
          ready = sorted([x for x in results if x["group"] == "有暴涨趋势组"], key=lambda x: x["score"], reverse=True)[:40]

          title = "AKI星星量全市场扫描 " + dt.datetime.now().strftime("%Y-%m-%d %H:%M")
          lines = [f"# {title}", "", f"本次扫描 {len(items)} 只股票，命中 {len(results)} 只。不是买卖建议。", ""]
          for group, arr in [("已暴涨验证组", exploded), ("有暴涨趋势组", ready)]:
              lines.append(f"## {group}（{len(arr)}只）")
              lines += ["今天没有命中。"] if not arr else [fmt(x, i) for i, x in enumerate(arr, 1)]
              lines.append("")
          if errors:
              lines.append(f"数据提醒：{errors} 次单股扫描失败，已跳过。")
          text = "\n".join(lines)
          print(text)
          push(title, text)
          PY
          python scan_market.py
