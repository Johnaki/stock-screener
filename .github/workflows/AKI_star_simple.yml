name: AKI 星星量简化扫描

on:
  workflow_dispatch:
  schedule:
    - cron: "10 10 * * 1-5"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas numpy requests

      - name: 运行星星量简化扫描
        run: |
          cat > aki_star_simple.py <<'PY'
          import datetime as dt
          import time

          import akshare as ak
          import pandas as pd

          FORCE_CODES = [
              {"code": "001696", "name": "宗申动力"},
              {"code": "002141", "name": "贤丰控股"},
              {"code": "301303", "name": "真兰仪表"},
              {"code": "000032", "name": "深桑达A"},
              {"code": "603011", "name": "合锻智能"},
              {"code": "300481", "name": "濮阳惠成"},
              {"code": "300401", "name": "花园生物"},
          ]

          def get_codes():
              items = []
              try:
                  spot = ak.stock_zh_a_spot_em()
                  spot = spot.rename(columns={"代码": "code", "名称": "name", "最新价": "price"})
                  spot["code"] = spot["code"].astype(str).str.zfill(6)
                  spot["name"] = spot["name"].astype(str)
                  spot["price"] = pd.to_numeric(spot["price"], errors="coerce")
                  spot = spot[~spot["name"].str.contains("ST", case=False, na=False)]
                  spot = spot[~spot["code"].str.startswith(("8", "4", "9"))]
                  spot = spot[(spot["price"] >= 2.5) & (spot["price"] <= 150)]
                  items = spot[["code", "name"]].head(1000).to_dict("records")
              except Exception as e:
                  print("股票列表获取失败，先扫描样本股：", e)

              seen = set()
              merged = []
              for x in FORCE_CODES + items:
                  code = str(x["code"]).zfill(6)
                  if code not in seen:
                      seen.add(code)
                      merged.append({"code": code, "name": str(x["name"])})
              return merged

          def get_history(code):
              end = dt.date.today().strftime("%Y%m%d")
              start = (dt.date.today() - dt.timedelta(days=520)).strftime("%Y%m%d")
              try:
                  return ak.stock_zh_a_hist(
                      symbol=code,
                      period="daily",
                      start_date=start,
                      end_date=end,
                      adjust="qfq",
                      timeout=15,
                  )
              except Exception as e:
                  print(f"{code} 东方财富历史行情失败，改用新浪：{e}")
                  prefix = "sh" if code.startswith("6") else "sz"
                  return ak.stock_zh_a_daily(
                      symbol=f"{prefix}{code}",
                      start_date=start,
                      end_date=end,
                      adjust="qfq",
                  )

          def prepare(df):
              if "日期" not in df.columns and "date" not in df.columns:
                  df = df.reset_index()
              df = df.rename(columns={
                  "日期": "date",
                  "开盘": "open",
                  "收盘": "close",
                  "最高": "high",
                  "最低": "low",
                  "成交量": "volume",
              })
              for col in ["open", "close", "high", "low", "volume"]:
