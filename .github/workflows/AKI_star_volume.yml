name: AKI 星星量每日扫描

on:
  schedule:
    - cron: "10 10 * * 1-5"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas numpy requests

      - name: 运行 AKI 星星量筛选
        env:
          AKI_SERVER_CHAN_SENDKEY: ${{ secrets.AKI_SERVER_CHAN_SENDKEY }}
        run: |
          python - <<'PY'
          import concurrent.futures
          import datetime as dt
          import os
          import time

          import akshare as ak
          import numpy as np
          import pandas as pd
          import requests


          SENDKEY = os.environ.get("AKI_SERVER_CHAN_SENDKEY")
          MAX_STOCKS = 4200
          MAX_WORKERS = 6


          def push(title, content):
              if not SENDKEY:
                  raise RuntimeError("没有设置 AKI_SERVER_CHAN_SENDKEY")
              url = f"https://sctapi.ftqq.com/{SENDKEY}.send"
              r = requests.post(url, data={"title": title, "desp": content}, timeout=30)
              print(r.text)
              r.raise_for_status()


          def get_codes():
              try:
                  df = ak.stock_zh_a_spot_em()
                  df = df.rename(columns={
                      "代码": "code",
                      "名称": "name",
                      "最新价": "price",
                      "总市值": "market_cap",
                  })
                  df["code"] = df["code"].astype(str).str.zfill(6)
                  df["name"] = df["name"].astype(str)
                  df = df[~df["name"].str.contains("ST", case=False, na=False)]
                  df = df[~df["code"].str.startswith(("8", "4", "9"))]
                  df["price"] = pd.to_numeric(df.get("price"), errors="coerce")
                  df["market_cap_yi"] = pd.to_numeric(df.get("market_cap"), errors="coerce") / 100000000
                  df = df[(df["price"] >= 2.5) & (df["price"] <= 120)]
                  df = df[(df["market_cap_yi"].isna()) | ((df["market_cap_yi"] >= 10) & (df["market_cap_yi"] <= 1500))]
                  return df[["code", "name", "market_cap_yi"]].dropna(subset=["code", "name"]).to_dict("records")
              except Exception as e:
                  print("东方财富股票列表失败，改用沪深交易所股票列表：", e)

              frames = []
              for label, getter, kwargs, code_col, name_col in [
                  ("沪市主板", ak.stock_info_sh_name_code, {"symbol": "主板A股"}, "证券代码", "证券简称"),
                  ("科创板", ak.stock_info_sh_name_code, {"symbol": "科创板"}, "证券代码", "证券简称"),
                  ("深市A股", ak.stock_info_sz_name_code, {"symbol": "A股列表"}, "A股代码", "A股简称"),
              ]:
                  try:
                      tmp = getter(**kwargs).rename(columns={code_col: "code", name_col: "name"})
                      frames.append(tmp[["code", "name"]])
                  except Exception as e:
                      print(f"{label}列表失败：{e}")

              if not frames:
                  raise RuntimeError("所有股票列表接口都失败了")

              df = pd.concat(frames, ignore_index=True)
              df["code"] = df["code"].astype(str).str.split(".", expand=True).iloc[:, 0].str.zfill(6)
              df["name"] = df["name"].astype(str)
              df = df[~df["name"].str.contains("ST", case=False, na=False)]
              df = df[~df["code"].str.startswith(("8", "4", "9"))]
              df["market_cap_yi"] = np.nan
              return df.drop_duplicates("code")[["code", "name", "market_cap_yi"]].to_dict("records")


